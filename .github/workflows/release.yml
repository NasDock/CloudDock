name: build-and-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image repo (lowercase)
        id: repo
        run: echo "image_repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.image_repo }}-server:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.image_repo }}-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clouddock-server:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clouddock-server:latest

      - name: Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/edge.dockerfile
          push: true
          build-args: |
            VITE_API_URL=http://localhost:3300/api
          tags: |
            ghcr.io/${{ steps.repo.outputs.image_repo }}-edge:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.image_repo }}-edge:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clouddock-edge:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clouddock-edge:latest

  build-android:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm -C packages/shared build

      - name: Expo Prebuild
        run: |
          cd packages/mobile
          npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK
        run: |
          cd packages/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare APK
        id: prepare_apk
        run: |
          VERSION=$(node -p "require('./packages/mobile/app.json').expo.version")
          OLD_PATH="packages/mobile/android/app/build/outputs/apk/release/app-release.apk"
          NEW_NAME="cloud-dock-${VERSION}.apk"
          NEW_PATH="/tmp/${NEW_NAME}"
          mv "$OLD_PATH" "$NEW_PATH"
          echo "apk_path=$NEW_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prepare_apk.outputs.apk_path }}


  deploy-server:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build server
        run: |
          pnpm -C packages/shared build
          pnpm -C packages/server build

      - name: Package server artifact
        run: |
          tar -czf clouddock-server.tgz \
            packages/server/dist

      - name: Upload server artifact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: clouddock-server.tgz
          target: /tmp/clouddock-deploy

      - name: Deploy server on host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            mkdir -p /tmp/clouddock-deploy/staging
            tar -xzf /tmp/clouddock-deploy/clouddock-server.tgz -C /tmp/clouddock-deploy/staging
            mkdir -p "${{ secrets.TARGET_DIR }}"
            rm -rf "${{ secrets.TARGET_DIR }}/server"
            mkdir -p "${{ secrets.TARGET_DIR }}/server"
            mv /tmp/clouddock-deploy/staging/packages/server/dist "${{ secrets.TARGET_DIR }}/server/dist"
            cd "${{ secrets.TARGET_DIR }}/server"
            bash -lc "${{ secrets.SERVER_RUN_SCRIPT }}"
