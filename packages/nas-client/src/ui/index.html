<html lang="en">

  <title>NAS Tunnel Client</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;

      --success: #22c55e;
      --warning: #eab308;
      --error: #ef4444;
