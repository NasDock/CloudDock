version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/server.dockerfile
    ports:
      - '3300:3000'  # HTTP API
      - '3301:3001'  # WebSocket
    environment:
      DATABASE_URL: file:/app/packages/server/data/clouddock.db
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3000
      WS_PORT: 3001
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - server_data:/app/packages/server/data
      - ../packages/server/src:/app/packages/server/src:ro
      - ../packages/shared/src:/app/node_modules/@cloud-dock/shared/src:ro

  edge:
    build:
      context: ..
      dockerfile: docker/edge.dockerfile
      args:
        VITE_API_URL: http://localhost:3300/api
    ports:
      - '3000:3000'  # Web UI
      - '5700:5700'  # NAS local API
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    # 如果 cap_add 在绿联 NAS 上不生效，取消下面这行的注释
    # privileged: true

volumes:
  redis_data:
  server_data:
